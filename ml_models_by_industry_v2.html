<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Models by Industry</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e28;--bg4:#0a0c10;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8e6df;--muted:#7a7870;--dim:#3e3d3a;
  --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;min-height:100vh;line-height:1.6}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}

.wrapper{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:48px 24px 80px}

/* Header */
.eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px;opacity:0;animation:fadeUp .5s .1s forwards}
h1{font-family:var(--font-head);font-size:clamp(26px,4.5vw,46px);font-weight:800;line-height:1.1;letter-spacing:-.02em;opacity:0;animation:fadeUp .5s .2s forwards}
h1 span{color:var(--accent,#c8f06e)}
.subtitle{font-size:13px;color:var(--muted);margin-top:10px;font-weight:300;opacity:0;animation:fadeUp .5s .3s forwards}
.header{margin-bottom:40px;padding-bottom:28px;border-bottom:1px solid var(--border)}

/* Industry tabs */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:28px;opacity:0;animation:fadeUp .5s .4s forwards}
.tab-btn{font-family:var(--font-head);font-size:13px;font-weight:600;padding:8px 18px;border-radius:6px;border:1px solid var(--border2);background:var(--bg2);color:var(--muted);cursor:pointer;transition:all .2s;letter-spacing:.01em}
.tab-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.tab-btn.active{color:#0d0f14;border-color:transparent}
.tab-btn[data-id="finance"].active{background:#c8f06e}
.tab-btn[data-id="healthcare"].active{background:#6ee8f0}
.tab-btn[data-id="retail"].active{background:#f0a06e}
.tab-btn[data-id="manufacturing"].active{background:#e06ef0}
.tab-btn[data-id="tech"].active{background:#6e90f0}

/* Layout: left model list + right detail */
.main-grid{display:grid;grid-template-columns:220px 1fr;gap:20px;align-items:start}
@media(max-width:680px){.main-grid{grid-template-columns:1fr}}

/* Model list panel */
.model-list-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;opacity:0;animation:fadeUp .4s .1s forwards;position:sticky;top:24px}
.model-list-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:12px}
.model-btn{display:block;width:100%;text-align:left;font-family:var(--font-body);font-size:13px;padding:9px 12px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;transition:all .18s;margin-bottom:4px;line-height:1.4}
.model-btn:hover{color:var(--text);background:var(--bg3);border-color:var(--border)}
.model-btn.active{color:#0d0f14;border-color:transparent;font-weight:500}

/* Accent colors per industry for model btn active */
.industry-finance   .model-btn.active{background:#c8f06e}
.industry-healthcare .model-btn.active{background:#6ee8f0}
.industry-retail    .model-btn.active{background:#f0a06e}
.industry-manufacturing .model-btn.active{background:#e06ef0}
.industry-tech      .model-btn.active{background:#6e90f0}

/* Right detail area */
.detail-area{display:flex;flex-direction:column;gap:16px;opacity:0;animation:fadeUp .35s .15s forwards}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px 22px;transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.card-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:12px}

/* Accent label color per industry */
.industry-finance    .card-label{color:#c8f06e}
.industry-healthcare .card-label{color:#6ee8f0}
.industry-retail     .card-label{color:#f0a06e}
.industry-manufacturing .card-label{color:#e06ef0}
.industry-tech       .card-label{color:#6e90f0}

/* Model title in detail */
.model-title{font-family:var(--font-head);font-size:20px;font-weight:700;margin-bottom:4px}
.model-desc{font-size:13px;color:var(--muted);line-height:1.6}

.top-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:860px){.top-row{grid-template-columns:1fr}}

/* Questions */
.q-list{list-style:none}
.q-list li{font-size:13px;color:var(--muted);padding:7px 0;border-bottom:1px solid var(--border);line-height:1.5;display:flex;gap:10px;align-items:baseline;transition:color .15s}
.q-list li:last-child{border-bottom:none}
.q-list li:hover{color:var(--text)}
.q-list li::before{content:'→';font-family:var(--font-mono);font-size:10px;flex-shrink:0}
.industry-finance    .q-list li::before{color:#c8f06e}
.industry-healthcare .q-list li::before{color:#6ee8f0}
.industry-retail     .q-list li::before{color:#f0a06e}
.industry-manufacturing .q-list li::before{color:#e06ef0}
.industry-tech       .q-list li::before{color:#6e90f0}

/* Code */
.code-wrap{background:var(--bg4);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:8px}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02)}
.code-dots{display:flex;gap:5px}
.code-dots span{width:9px;height:9px;border-radius:50%;background:var(--border2)}
.code-lang{font-family:var(--font-mono);font-size:10px;color:var(--dim);letter-spacing:.08em}
.copy-btn{font-family:var(--font-mono);font-size:10px;color:var(--muted);background:none;border:1px solid var(--border2);padding:3px 10px;border-radius:4px;cursor:pointer;transition:all .15s;letter-spacing:.05em}
.copy-btn:hover{color:var(--text);border-color:rgba(255,255,255,.25)}
.copy-btn.copied{color:#c8f06e;border-color:#c8f06e}
pre{font-family:var(--font-mono);font-size:12px;line-height:1.8;padding:16px;overflow-x:auto;color:#c8c5bc}
.kw{color:#c8a0f8}.fn{color:#6ee8b0}.cm{color:#4a5568;font-style:italic}.st{color:#f0c070}.nm{color:#6ec8f0}

.metric-note{margin-top:12px;padding:10px 14px;background:rgba(255,255,255,.03);border-left:2px solid var(--border2);border-radius:0 6px 6px 0;font-size:12px;color:var(--muted);font-family:var(--font-mono)}
.metric-note strong{color:var(--text);font-weight:500}
.industry-finance    .metric-note{border-left-color:#c8f06e}
.industry-healthcare .metric-note{border-left-color:#6ee8f0}
.industry-retail     .metric-note{border-left-color:#f0a06e}
.industry-manufacturing .metric-note{border-left-color:#e06ef0}
.industry-tech       .metric-note{border-left-color:#6e90f0}

/* Panel hidden state */
.industry-panel{display:none}
.industry-panel.active{display:block}

/* Detail swap animation */
@keyframes detailIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.detail-area{animation:detailIn .25s forwards}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

pre::-webkit-scrollbar{height:4px}
pre::-webkit-scrollbar-track{background:transparent}
pre::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="wrapper">

<header class="header">
  <div class="eyebrow">// Data Science Reference</div>
  <h1>ML Models <span>by Industry</span></h1>
  <p class="subtitle">Click an industry → pick a model → see its questions &amp; workflow</p>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-id="finance"        onclick="showIndustry('finance',this)">Finance</button>
  <button class="tab-btn"        data-id="healthcare"     onclick="showIndustry('healthcare',this)">Healthcare</button>
  <button class="tab-btn"        data-id="retail"         onclick="showIndustry('retail',this)">Retail</button>
  <button class="tab-btn"        data-id="manufacturing"  onclick="showIndustry('manufacturing',this)">Manufacturing</button>
  <button class="tab-btn"        data-id="tech"           onclick="showIndustry('tech',this)">Tech / NLP</button>
</nav>

<!-- ═══════════════════════════════ FINANCE ═══════════════════════════════ -->
<div class="industry-panel active" id="ip-finance">
<div class="main-grid industry-finance">
  <div class="model-list-card">
    <div class="model-list-label">Models</div>

    <button class="model-btn" onclick="showModel('finance','isoforest',this)">Isolation Forest</button>
    <button class="model-btn" onclick="showModel('finance','lstm',this)">LSTM</button>
    <button class="model-btn" onclick="showModel('finance','kmeans',this)">K-Means</button>
    <button class="model-btn" onclick="showModel('finance','rf',this)">Random Forest</button>
  </div>
  <div id="detail-finance"></div>
</div>
</div>

<!-- ═══════════════════════════════ HEALTHCARE ═══════════════════════════════ -->
<div class="industry-panel" id="ip-healthcare">
<div class="main-grid industry-healthcare">
  <div class="model-list-card">
    <div class="model-list-label">Models</div>
    <button class="model-btn active" onclick="showModel('healthcare','rf',this)">Random Forest</button>
    <button class="model-btn" onclick="showModel('healthcare','logreg',this)">Logistic Regression</button>
    <button class="model-btn" onclick="showModel('healthcare','cnn',this)">CNN (Imaging)</button>
    <button class="model-btn" onclick="showModel('healthcare','cox',this)">Cox Survival Model</button>
    <button class="model-btn" onclick="showModel('healthcare','xgboost',this)">XGBoost</button>
    <button class="model-btn" onclick="showModel('healthcare','bert',this)">BERT (Clinical NLP)</button>
  </div>
  <div id="detail-healthcare"></div>
</div>
</div>

<!-- ═══════════════════════════════ RETAIL ═══════════════════════════════ -->
<div class="industry-panel" id="ip-retail">
<div class="main-grid industry-retail">
  <div class="model-list-card">
    <div class="model-list-label">Models</div>
    <button class="model-btn active" onclick="showModel('retail','kmeans',this)">K-Means (RFM)</button>
    <button class="model-btn" onclick="showModel('retail','collab',this)">Collaborative Filtering</button>
    <button class="model-btn" onclick="showModel('retail','prophet',this)">Prophet / ARIMA</button>
    <button class="model-btn" onclick="showModel('retail','xgboost',this)">XGBoost (Churn)</button>
    <button class="model-btn" onclick="showModel('retail','mf',this)">Matrix Factorization</button>
  </div>
  <div id="detail-retail"></div>
</div>
</div>

<!-- ═══════════════════════════════ MANUFACTURING ═══════════════════════════════ -->
<div class="industry-panel" id="ip-manufacturing">
<div class="main-grid industry-manufacturing">
  <div class="model-list-card">
    <div class="model-list-label">Models</div>
    <button class="model-btn active" onclick="showModel('manufacturing','isoforest',this)">Isolation Forest</button>
    <button class="model-btn" onclick="showModel('manufacturing','lstm_ae',this)">LSTM Autoencoder</button>
    <button class="model-btn" onclick="showModel('manufacturing','rf',this)">Random Forest</button>
    <button class="model-btn" onclick="showModel('manufacturing','pca',this)">PCA</button>
    <button class="model-btn" onclick="showModel('manufacturing','svm',this)">SVM</button>
    <button class="model-btn" onclick="showModel('manufacturing','cnn',this)">CNN (Visual QC)</button>
  </div>
  <div id="detail-manufacturing"></div>
</div>
</div>

<!-- ═══════════════════════════════ TECH / NLP ═══════════════════════════════ -->
<div class="industry-panel" id="ip-tech">
<div class="main-grid industry-tech">
  <div class="model-list-card">
    <div class="model-list-label">Models</div>
    <button class="model-btn active" onclick="showModel('tech','bert',this)">Transformers / BERT</button>
    <button class="model-btn" onclick="showModel('tech','logreg',this)">Logistic Regression</button>
    <button class="model-btn" onclick="showModel('tech','lgbm',this)">LightGBM (CTR)</button>
    <button class="model-btn" onclick="showModel('tech','ab',this)">A/B Testing</button>
    <button class="model-btn" onclick="showModel('tech','collab',this)">Collaborative Filtering</button>
  </div>
  <div id="detail-tech"></div>
</div>
</div>

</div><!-- /wrapper -->

<script>
// ─── DATA ──────────────────────────────────────────────────────────────────
const DATA = {

finance: {
  xgboost: {
    title: "XGBoost / LightGBM",
    desc: "Gradient boosted trees — the go-to for tabular financial data. Handles missing values, imbalanced classes, and gives feature importance out of the box.",
    questions: [
      "Will this customer default on their loan?",
      "What is the probability of credit card delinquency in 90 days?",
      "Which features drive the default risk most? (SHAP)",
      "How does the model perform across different income brackets?",
      "Can we explain a rejection decision to a regulator?"
    ],
    metric: "<strong>Key metric:</strong> AUC-ROC + KS statistic. Accuracy is misleading on imbalanced datasets (99% good loans). Use <code>scale_pos_weight</code> to handle class imbalance.",
    code: `<span class="kw">import</span> xgboost <span class="kw">as</span> xgb
<span class="kw">import</span> shap
<span class="kw">from</span> sklearn.model_selection <span class="kw">import</span> train_test_split
<span class="kw">from</span> sklearn.metrics <span class="kw">import</span> roc_auc_score, classification_report
<span class="kw">from</span> sklearn.preprocessing <span class="kw">import</span> StandardScaler

<span class="cm"># 1. Split — stratify keeps class ratio in both sets</span>
X_train, X_test, y_train, y_test = train_test_split(
    X, y, test_size=<span class="nm">0.2</span>, random_state=<span class="nm">42</span>, stratify=y)

<span class="cm"># 2. Scale</span>
scaler = StandardScaler()
X_train = scaler.<span class="fn">fit_transform</span>(X_train)
X_test  = scaler.<span class="fn">transform</span>(X_test)

<span class="cm"># 3. Train — scale_pos_weight handles class imbalance</span>
model = xgb.<span class="fn">XGBClassifier</span>(
    n_estimators=<span class="nm">300</span>, max_depth=<span class="nm">5</span>,
    learning_rate=<span class="nm">0.05</span>, scale_pos_weight=<span class="nm">10</span>,
    eval_metric=<span class="st">'logloss'</span>, use_label_encoder=<span class="kw">False</span>)
model.<span class="fn">fit</span>(X_train, y_train,
    eval_set=[(X_test, y_test)], early_stopping_rounds=<span class="nm">20</span>, verbose=<span class="kw">False</span>)

<span class="cm"># 4. Evaluate</span>
y_prob = model.<span class="fn">predict_proba</span>(X_test)[:, <span class="nm">1</span>]
<span class="fn">print</span>(<span class="st">f"AUC-ROC: {roc_auc_score(y_test, y_prob):.3f}"</span>)
<span class="fn">print</span>(classification_report(y_test, model.<span class="fn">predict</span>(X_test)))

<span class="cm"># 5. SHAP — required for regulatory explainability</span>
explainer  = shap.<span class="fn">TreeExplainer</span>(model)
shap_vals  = explainer.<span class="fn">shap_values</span>(X_test)
shap.<span class="fn">summary_plot</span>(shap_vals, X_test, feature_names=feature_names)
shap.<span class="fn">waterfall_plot</span>(explainer(<span class="fn">pd.DataFrame</span>(X_test))[<span class="nm">0</span>])`
  },

  logreg: {
    title: "Logistic Regression",
    desc: "Simple, fast, and fully interpretable. Often used as a baseline or where regulators require transparent scoring models (e.g., FICO-style scorecards).",
    questions: [
      "What's the probability this applicant defaults?",
      "Which variables contribute to the credit score and by how much?",
      "Can we build a scorecard that a loan officer can use manually?",
      "Is our model compliant with fair lending laws? (no proxy variables)"
    ],
    metric: "<strong>Key metric:</strong> AUC-ROC and Gini coefficient. For scorecards, also check Population Stability Index (PSI) to detect data drift over time.",
    code: `<span class="kw">from</span> sklearn.linear_model <span class="kw">import</span> LogisticRegression
<span class="kw">from</span> sklearn.pipeline <span class="kw">import</span> Pipeline
<span class="kw">from</span> sklearn.preprocessing <span class="kw">import</span> StandardScaler
<span class="kw">from</span> sklearn.metrics <span class="kw">import</span> roc_auc_score, classification_report
<span class="kw">import</span> pandas <span class="kw">as</span> pd
<span class="kw">import</span> numpy <span class="kw">as</span> np

<span class="cm"># 1. Pipeline: scale + fit in one step</span>
pipe = <span class="fn">Pipeline</span>([
    (<span class="st">'scaler'</span>, StandardScaler()),
    (<span class="st">'lr'</span>, <span class="fn">LogisticRegression</span>(
        C=<span class="nm">0.1</span>, class_weight=<span class="st">'balanced'</span>,
        solver=<span class="st">'lbfgs'</span>, max_iter=<span class="nm">1000</span>))
])
pipe.<span class="fn">fit</span>(X_train, y_train)

<span class="cm"># 2. Evaluate</span>
y_prob = pipe.<span class="fn">predict_proba</span>(X_test)[:, <span class="nm">1</span>]
<span class="fn">print</span>(<span class="st">f"AUC-ROC: {roc_auc_score(y_test, y_prob):.3f}"</span>)
<span class="fn">print</span>(classification_report(y_test, pipe.<span class="fn">predict</span>(X_test)))

<span class="cm"># 3. Scorecard: convert coefficients to points</span>
lr       = pipe.named_steps[<span class="st">'lr'</span>]
coef_df  = <span class="fn">pd.DataFrame</span>({
    <span class="st">'feature'</span>: feature_names,
    <span class="st">'coef'</span>: lr.coef_[<span class="nm">0</span>],
    <span class="st">'odds_ratio'</span>: np.<span class="fn">exp</span>(lr.coef_[<span class="nm">0</span>])
}).<span class="fn">sort_values</span>(<span class="st">'coef'</span>, ascending=<span class="kw">False</span>)
<span class="fn">print</span>(coef_df)

<span class="cm"># 4. Gini coefficient (common in banking)</span>
gini = <span class="nm">2</span> * <span class="fn">roc_auc_score</span>(y_test, y_prob) - <span class="nm">1</span>
<span class="fn">print</span>(<span class="st">f"Gini: {gini:.3f}"</span>)`
  },

  isoforest: {
    title: "Isolation Forest",
    desc: "Unsupervised anomaly detection — no fraud labels needed. Isolates unusual transactions by randomly partitioning features. Fast and works well on high-dimensional data.",
    questions: [
      "Is this transaction fraudulent? (No labeled data available)",
      "Which transactions are statistical outliers worth reviewing?",
      "How unusual is this transaction compared to the customer's history?",
      "Can we flag the top 1% most anomalous transactions for manual review?"
    ],
    metric: "<strong>Key metric:</strong> Precision@K — of the top K flagged transactions, how many are real fraud? Set <code>contamination</code> to your expected fraud rate.",
    code: `<span class="kw">from</span> sklearn.ensemble <span class="kw">import</span> IsolationForest
<span class="kw">from</span> sklearn.preprocessing <span class="kw">import</span> StandardScaler
<span class="kw">from</span> sklearn.metrics <span class="kw">import</span> precision_score, recall_score, roc_auc_score
<span class="kw">import</span> pandas <span class="kw">as</span> pd

<span class="cm"># 1. Scale features</span>
scaler   = <span class="fn">StandardScaler</span>()
X_scaled = scaler.<span class="fn">fit_transform</span>(X_transactions)

<span class="cm"># 2. Fit — no labels needed</span>
iso = <span class="fn">IsolationForest</span>(
    contamination=<span class="nm">0.01</span>,  <span class="cm"># ~1% expected fraud rate</span>
    n_estimators=<span class="nm">200</span>,
    max_samples=<span class="st">'auto'</span>,
    random_state=<span class="nm">42</span>)
iso.<span class="fn">fit</span>(X_scaled)

<span class="cm"># 3. Score: lower = more anomalous</span>
df[<span class="st">'anomaly_score'</span>] = iso.<span class="fn">decision_function</span>(X_scaled)
df[<span class="st">'is_fraud_flag'</span>] = iso.<span class="fn">predict</span>(X_scaled) == <span class="nm">-1</span>

<span class="cm"># 4. Evaluate against known labels (if available)</span>
flagged = df[<span class="st">'is_fraud_flag'</span>].<span class="fn">astype</span>(<span class="fn">int</span>)
<span class="fn">print</span>(<span class="st">f"Precision: {precision_score(y_true, flagged):.3f}"</span>)
<span class="fn">print</span>(<span class="st">f"Recall:    {recall_score(y_true, flagged):.3f}"</span>)

<span class="cm"># 5. Top-K review queue</span>
review_queue = df.<span class="fn">nsmallest</span>(<span class="nm">100</span>, <span class="st">'anomaly_score'</span>)[
    [<span class="st">'transaction_id'</span>, <span class="st">'amount'</span>, <span class="st">'anomaly_score'</span>]]
<span class="fn">print</span>(review_queue)`
  },

  lstm: {
    title: "LSTM",
    desc: "Long Short-Term Memory — a recurrent neural network for sequential/time-series data. Used for stock price forecasting, transaction sequence modeling, and time-series anomaly detection.",
    questions: [
      "What will this asset's price be over the next 5 days?",
      "Can we detect unusual sequences of transactions over time?",
      "What is the trend direction for this stock — up or down?",
      "How do macro events propagate through time-series signals?"
    ],
    metric: "<strong>Key metric:</strong> MAE / RMSE for regression. Direction accuracy (did we predict up/down correctly?) is often more useful in trading than raw error.",
    code: `<span class="kw">import</span> numpy <span class="kw">as</span> np
<span class="kw">from</span> sklearn.preprocessing <span class="kw">import</span> MinMaxScaler
<span class="kw">from</span> tensorflow.keras.models <span class="kw">import</span> Sequential
<span class="kw">from</span> tensorflow.keras.layers <span class="kw">import</span> LSTM, Dense, Dropout
<span class="kw">from</span> sklearn.metrics <span class="kw">import</span> mean_absolute_error

<span class="cm"># 1. Create sequences (look back 60 days, predict next)</span>
<span class="kw">def</span> <span class="fn">make_sequences</span>(data, lookback=<span class="nm">60</span>):
    X, y = [], []
    <span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(lookback, <span class="fn">len</span>(data)):
        X.<span class="fn">append</span>(data[i-lookback:i])
        y.<span class="fn">append</span>(data[i, <span class="nm">0</span>])
    <span class="kw">return</span> np.<span class="fn">array</span>(X), np.<span class="fn">array</span>(y)

scaler   = <span class="fn">MinMaxScaler</span>()
data_sc  = scaler.<span class="fn">fit_transform</span>(price_df[[<span class="st">'close'</span>]])
X, y     = <span class="fn">make_sequences</span>(data_sc, lookback=<span class="nm">60</span>)

<span class="cm"># 2. Build LSTM model</span>
model = <span class="fn">Sequential</span>([
    <span class="fn">LSTM</span>(<span class="nm">64</span>, return_sequences=<span class="kw">True</span>, input_shape=(X.shape[<span class="nm">1</span>], X.shape[<span class="nm">2</span>])),
    <span class="fn">Dropout</span>(<span class="nm">0.2</span>),
    <span class="fn">LSTM</span>(<span class="nm">32</span>, return_sequences=<span class="kw">False</span>),
    <span class="fn">Dropout</span>(<span class="nm">0.2</span>),
    <span class="fn">Dense</span>(<span class="nm">1</span>)
])
model.<span class="fn">compile</span>(optimizer=<span class="st">'adam'</span>, loss=<span class="st">'mse'</span>)
model.<span class="fn">fit</span>(X_train, y_train, epochs=<span class="nm">30</span>,
    batch_size=<span class="nm">32</span>, validation_split=<span class="nm">0.1</span>, verbose=<span class="nm">1</span>)

<span class="cm"># 3. Predict and inverse-scale back to prices</span>
y_pred_sc  = model.<span class="fn">predict</span>(X_test)
y_pred     = scaler.<span class="fn">inverse_transform</span>(y_pred_sc)
y_actual   = scaler.<span class="fn">inverse_transform</span>(y_test.<span class="fn">reshape</span>(-<span class="nm">1</span>,<span class="nm">1</span>))

<span class="cm"># 4. Evaluate</span>
mae = <span class="fn">mean_absolute_error</span>(y_actual, y_pred)
direction_acc = (<span class="fn">np.sign</span>(np.<span class="fn">diff</span>(y_pred.<span class="fn">flatten</span>())) ==
                 <span class="fn">np.sign</span>(np.<span class="fn">diff</span>(y_actual.<span class="fn">flatten</span>()))).mean()
<span class="fn">print</span>(<span class="st">f"MAE: {mae:.4f} | Direction Acc: {direction_acc:.3f}"</span>)`
  },

      "Which videos/songs/posts should we surface next for this user?",
      "Can we recommend without knowing content features? (pure CF)",
      "How do we handle brand-new users with no history?",
      "How do we measure recommendation quality in an online A/B test?"
    ],
    metric: "<strong>Key metric:</strong> Precision@K, Recall@K, NDCG@K offline. Online: CTR on recommended items and session length change. Offline metrics are necessary but not sufficient.",
    code: `<span class="kw">import</span> implicit
<span class="kw">from</span> scipy.sparse <span class="kw">import</span> csr_matrix
<span class="kw">import</span> numpy <span class="kw">as</span> np
<span class="kw">import</span> pandas <span class="kw">as</span> pd

<span class="cm"># 1. Build user-item matrix from implicit signals (plays, clicks)</span>
<span class="cm"># Confidence: c_ui = 1 + alpha * r_ui (higher interaction = more confident)</span>
alpha = <span class="nm">40</span>
interactions[<span class="st">'confidence'</span>] = <span class="nm">1</span> + alpha * interactions[<span class="st">'play_count'</span>]
user_item = <span class="fn">csr_matrix</span>((
    interactions[<span class="st">'confidence'</span>],
    (interactions[<span class="st">'user_idx'</span>], interactions[<span class="st">'item_idx'</span>])))

<span class="cm"># 2. Train ALS model</span>
model = implicit.als.<span class="fn">AlternatingLeastSquares</span>(
    factors=<span class="nm">128</span>, regularization=<span class="nm">0.01</span>,
    iterations=<span class="nm">50</span>, use_gpu=<span class="kw">False</span>)
model.<span class="fn">fit</span>(user_item)

<span class="cm"># 3. Recommend top-10 for a user</span>
user_id = <span class="nm">1234</span>
recs, scores = model.<span class="fn">recommend</span>(
    user_id, user_item[user_id], N=<span class="nm">10</span>,
    filter_already_liked_items=<span class="kw">True</span>)
<span class="fn">print</span>(item_lookup.<span class="fn">iloc</span>[recs])

<span class="cm"># 4. NDCG@K evaluation</span>
<span class="kw">def</span> <span class="fn">ndcg_at_k</span>(recommended, relevant, k=<span class="nm">10</span>):
    dcg  = <span class="fn">sum</span>([<span class="nm">1</span>/np.<span class="fn">log2</span>(i+<span class="nm">2</span>) <span class="kw">for</span> i,r <span class="kw">in</span> <span class="fn">enumerate</span>(recommended[:k]) <span class="kw">if</span> r <span class="kw">in</span> relevant])
    idcg = <span class="fn">sum</span>([<span class="nm">1</span>/np.<span class="fn">log2</span>(i+<span class="nm">2</span>) <span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="fn">min</span>(k, <span class="fn">len</span>(relevant)))])
    <span class="kw">return</span> dcg/idcg <span class="kw">if</span> idcg > <span class="nm">0</span> <span class="kw">else</span> <span class="nm">0</span>
scores = [<span class="fn">ndcg_at_k</span>(user_recs[u], held_out[u]) <span class="kw">for</span> u <span class="kw">in</span> test_users]
<span class="fn">print</span>(<span class="st">f"Mean NDCG@10: {np.mean(scores):.3f}"</span>)`
  }
}
};

// ─── DEFAULT MODELS ────────────────────────────────────────────────────────
const DEFAULTS = {
  finance: 'xgboost',
  healthcare: 'rf',
  retail: 'kmeans',
  manufacturing: 'isoforest',
  tech: 'bert'
};

// ─── RENDER ────────────────────────────────────────────────────────────────
function renderDetail(industry, modelKey) {
  const d = DATA[industry][modelKey];
  if (!d) return;
  const el = document.getElementById('detail-' + industry);
  el.innerHTML = `
    <div class="detail-area">
      <div class="card">
        <div class="card-label">Selected model</div>
        <div class="model-title">${d.title}</div>
        <div class="model-desc">${d.desc}</div>
      </div>
      <div class="top-row">
        <div class="card">
          <div class="card-label">Questions this model answers</div>
          <ul class="q-list">${d.questions.map(q=>`<li>${q}</li>`).join('')}</ul>
        </div>
        <div class="card">
          <div class="card-label">Core workflow &amp; evaluation</div>
          <div class="code-wrap">
            <div class="code-header">
              <div class="code-dots"><span></span><span></span><span></span></div>
              <span class="code-lang">PYTHON</span>
              <button class="copy-btn" onclick="copyCode(this)">copy</button>
            </div>
            <pre>${d.code}</pre>
          </div>
          <div class="metric-note">${d.metric}</div>
        </div>
      </div>
    </div>`;
}

function showModel(industry, modelKey, btn) {
  document.querySelectorAll(`#ip-${industry} .model-btn`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderDetail(industry, modelKey);
}

function showIndustry(id, btn) {
  document.querySelectorAll('.industry-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('ip-' + id).classList.add('active');
  btn.classList.add('active');
}

function copyCode(btn) {
  const pre = btn.closest('.code-wrap').querySelector('pre');
  navigator.clipboard.writeText(pre.innerText).then(() => {
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// ─── INIT ──────────────────────────────────────────────────────────────────
Object.keys(DEFAULTS).forEach(ind => renderDetail(ind, DEFAULTS[ind]));
</script>
</body>
